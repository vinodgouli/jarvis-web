<!DOCTYPE html>
<html>
<head>
    <title>Jarvis AI Assistant</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #141e30, #243b55);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .app {
            width: 420px;
            height: 600px;
            background: rgba(255,255,255,0.08);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 40px rgba(0,0,0,0.5);
        }

        .header {
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
        }

        .chat-box {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
        }

        .msg {
            margin: 10px 0;
            padding: 12px;
            border-radius: 10px;
            max-width: 70%;
        }

        .user {
            background: #00c6ff;
            align-self: flex-end;
            color: black;
        }

        .bot {
            background: rgba(255,255,255,0.2);
            align-self: flex-start;
        }

        .input-area {
            display: flex;
            padding: 10px;
            border-top: 1px solid rgba(255,255,255,0.2);
        }

        input {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            border: none;
            outline: none;
        }

        button {
            margin-left: 5px;
            border: none;
            border-radius: 10px;
            padding: 10px;
            cursor: pointer;
        }

        .send-btn { background: #00c6ff; }
        .voice-btn { background: #ff4b2b; }
        .clear-btn { background: #999; }

        .typing {
            font-style: italic;
            opacity: 0.7;
        }

        .glow {
            box-shadow: 0 0 20px #ff4b2b;
        }
    </style>
</head>

<body>

<div class="app">

    <div class="header">
        🤖 Jarvis Assistant
    </div>

    <div class="chat-box" id="chat"></div>

    <div class="input-area">
        <input id="msg" placeholder="Type message..." onkeypress="handleKey(event)">
        <button class="send-btn" onclick="send()">Send</button>
        <button class="voice-btn" onclick="startVoice()">🎤</button>
        <button class="clear-btn" onclick="clearChat()">🧹</button>
    </div>

</div>

<script>

function addMessage(text, type){
    let chat = document.getElementById("chat");

    let div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

function send(){
    let input = document.getElementById("msg");
    let message = input.value.trim();

    if(!message) return;

    addMessage(message, "user");
    input.value = "";

    let typing = document.createElement("div");
    typing.className = "msg bot typing";
    typing.innerText = "Jarvis is typing...";
    document.getElementById("chat").appendChild(typing);

    fetch("/chat", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({message: message})
    })
    .then(res=>res.json())
    .then(data=>{
        typing.remove();
        addMessage(data.response, "bot");
        speak(data.response);
    });
}

function startVoice(){
    let recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
    recognition.lang = "en-US";

    document.body.classList.add("glow");

    recognition.onresult = function(event){
        let speech = event.results[0][0].transcript;
        document.getElementById("msg").value = speech;
        send();
        document.body.classList.remove("glow");
    };

    recognition.start();
}

function speak(text){
    let speech = new SpeechSynthesisUtterance(text);
    speech.lang = "en-US";
    window.speechSynthesis.speak(speech);
}

function clearChat(){
    document.getElementById("chat").innerHTML = "";
}

function handleKey(e){
    if(e.key === "Enter"){
        send();
    }
}

</script>
<h1 style="color:red;">🔥 NEW UI WORKING 🔥</h1>
</body>
</html>
